name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Format check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -skip '^(TestSynthetic|TestE2E)'

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Static analysis (staticcheck)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./...

      - name: Configure Docker CDI
        run: |
          sudo mkdir -p /etc/docker /etc/cdi
          sudo chown "$USER:$(id -gn)" /etc/cdi
          if [ ! -f /etc/docker/daemon.json ]; then
            echo '{}' | sudo tee /etc/docker/daemon.json >/dev/null
          fi
          sudo cp /etc/docker/daemon.json /etc/docker/daemon.json.bak
          jq '.features = ((.features // {}) + {"cdi": true}) |
              ."cdi-spec-dirs" = (((."cdi-spec-dirs" // ["/etc/cdi", "/var/run/cdi"]) + ["/etc/cdi"]) | unique)' \
            /etc/docker/daemon.json |
            sudo tee /etc/docker/daemon.json.tmp >/dev/null
          sudo mv /etc/docker/daemon.json.tmp /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info

      - name: Synthetic integration (docker)
        env:
          NDC_CONTAINER_CLI: docker
        run: go test ./integration -run '^TestSynthetic' -count=1 -v

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install direnv
        run: |
          sudo apt-get update
          sudo apt-get install -y direnv

      - name: End-to-end integration (docker)
        env:
          NDC_CONTAINER_CLI: docker
        run: go test ./integration -run '^TestE2E' -count=1 -v

      - name: End-to-end integration (podman)
        env:
          NDC_CONTAINER_CLI: podman
        run: go test ./integration -run '^TestE2E' -count=1 -v
