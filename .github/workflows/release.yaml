name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Test
        run: |
          go build ./...
          go vet ./...
          go test ./... -skip '^(TestSynthetic|TestE2E)'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          short_commit="${COMMIT::7}"
          build_date="$(date -u +%Y%m%dT%H%M%SZ)"

          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="dist/nix-direnv-cdi_${VERSION}_${os}_${arch}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${short_commit} -X main.buildDate=${build_date}" \
              -o "${out}" .
          done

          syft . \
            --source-name nix-direnv-cdi \
            --source-version "${VERSION}" \
            -o "spdx-json=dist/nix-direnv-cdi_${VERSION}_sbom.spdx.json"

          (cd dist && sha256sum nix-direnv-cdi_* > SHA256SUMS)
          cp LICENSE dist/

      - name: Sign artifacts
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for artifact in dist/nix-direnv-cdi_* dist/SHA256SUMS; do
            cosign sign-blob "${artifact}" \
              --output-signature "${artifact}.sig" \
              --bundle "${artifact}.bundle"
          done

      - name: Attest binaries
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/nix-direnv-cdi_${{ github.ref_name }}_linux_amd64
            dist/nix-direnv-cdi_${{ github.ref_name }}_linux_arm64
            dist/SHA256SUMS

      - name: Attest SBOM
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2.4.0
        with:
          subject-path: |
            dist/nix-direnv-cdi_${{ github.ref_name }}_linux_amd64
            dist/nix-direnv-cdi_${{ github.ref_name }}_linux_arm64
          sbom-path: dist/nix-direnv-cdi_${{ github.ref_name }}_sbom.spdx.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Extract just this version's section from CHANGELOG.md (between
          # "## <tag>" and the next "## " heading). Fall back to GitHub's
          # auto-generated notes if the tag has no matching section.
          awk -v ver="## ${VERSION}" '
            $0 == ver {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            notes_args=(--notes-file RELEASE_NOTES.md)
          else
            notes_args=(--generate-notes)
          fi
          gh release view "${VERSION}" >/dev/null 2>&1 || \
            gh release create "${VERSION}" --title "${VERSION}" "${notes_args[@]}"
          gh release upload "${VERSION}" dist/* --clobber
