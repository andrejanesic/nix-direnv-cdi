name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Tier A unit tests
        # Tier A needs no container runtime. Tier B/C self-skip (t.Skip) when no
        # CDI-capable runtime / nix is present, so they are safe to run here too.
        run: go test ./...
